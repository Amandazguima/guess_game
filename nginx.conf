events {
    worker_connections 1024;
}

http {
    upstream guessgame_backend {
        server backend:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Serve os arquivos estáticos do React (index.html + JS/CSS)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Rotas da API: o frontend React chama /create e /guess/<id> (sem /api/).
        # Esses blocos fazem proxy direto para o Flask backend.
        location = /create {
            proxy_pass http://guessgame_backend/create;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/guess/ {
            proxy_pass http://guessgame_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compatibilidade: também aceita /api/create e /api/guess/<id> (com strip do prefixo)
        location /api/ {
            proxy_pass http://guessgame_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://guessgame_backend/health;
            proxy_set_header Host $host;
        }
    }
}